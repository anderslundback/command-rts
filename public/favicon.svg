<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#080b10"/>

  <!-- Outer diamond: center(16,16) half-diag=8 -->
  <polygon points="16,8 24,16 16,24 8,16"
           fill="rgba(201,170,80,0.10)" stroke="#c9aa50" stroke-width="1.5" stroke-linejoin="miter"/>

  <!-- Inner diamond: half-diag=4 -->
  <polygon points="16,12 20,16 16,20 12,16"
           fill="none" stroke="#c9aa50" stroke-width="0.75" stroke-opacity="0.38"/>

  <!-- Crosshair ticks: 2px gap, 4px length -->
  <line x1="16" y1="6"  x2="16" y2="2"  stroke="#c9aa50" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="16" y1="26" x2="16" y2="30" stroke="#c9aa50" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="6"  y1="16" x2="2"  y2="16" stroke="#c9aa50" stroke-width="1.5" stroke-linecap="square"/>
  <line x1="26" y1="16" x2="30" y2="16" stroke="#c9aa50" stroke-width="1.5" stroke-linecap="square"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#c9aa50"/>
</svg>
